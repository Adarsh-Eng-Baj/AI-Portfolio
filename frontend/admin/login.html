<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Adarsh Sutar Portfolio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
  <script>window.API_BASE_URL = 'http://localhost:5000/api';</script>
</head>
<body>

  <!-- Background orbs -->
  <div style="position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
    <div style="position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.25),transparent 70%);top:-200px;right:-100px;filter:blur(80px);"></div>
    <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,0.2),transparent 70%);bottom:-100px;left:-50px;filter:blur(80px);"></div>
    <div class="hero-grid" style="position:fixed;"></div>
  </div>

  <!-- Login Card -->
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-xl);position:relative;z-index:1;">
    <div style="width:100%;max-width:420px;">

      <!-- Logo -->
      <div style="text-align:center;margin-bottom:var(--space-2xl);">
        <div style="width:72px;height:72px;border-radius:var(--radius-xl);background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto var(--space-md);box-shadow:var(--shadow-glow);">
          🔐
        </div>
        <h1 style="font-size:var(--text-2xl);margin-bottom:var(--space-xs);">Admin Portal</h1>
        <p style="color:var(--clr-text-muted);font-size:var(--text-sm);">Adarsh Sutar's Portfolio Dashboard</p>
      </div>

      <!-- Login Form -->
      <div class="card glass-card" style="padding:var(--space-2xl);">
        <form id="login-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="admin-email">Email Address</label>
            <input
              type="email"
              id="admin-email"
              name="email"
              class="form-input"
              placeholder="admin@portfolio.com"
              autocomplete="email"
              required
            />
            <span class="form-error-msg" data-error="email"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="admin-password">Password</label>
            <div style="position:relative;">
              <input
                type="password"
                id="admin-password"
                name="password"
                class="form-input"
                placeholder="••••••••"
                autocomplete="current-password"
                required
                style="padding-right:48px;"
              />
              <button type="button" id="toggle-pwd" aria-label="Toggle password visibility"
                      style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--clr-text-muted);">
                👁️
              </button>
            </div>
            <span class="form-error-msg" data-error="password"></span>
          </div>

          <!-- Error message -->
          <div id="login-error" style="display:none;padding:var(--space-md);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--clr-red);margin-bottom:var(--space-lg);">
            ❌ <span id="login-error-msg">Invalid credentials</span>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;" id="login-btn">
            <span id="login-btn-text">Sign In →</span>
            <span id="login-spinner" style="display:none;">
              <div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0;"></div>
            </span>
          </button>

        </form>

        <!-- Default credentials hint -->
        <div style="margin-top:var(--space-xl);padding:var(--space-md);background:var(--clr-surface2);border-radius:var(--radius-md);font-size:var(--text-xs);color:var(--clr-text-muted);">
          <strong style="color:var(--clr-text);">Default credentials (first run):</strong><br />
          Email: <code style="color:var(--clr-cyan);">admin@portfolio.com</code><br />
          Password: <code style="color:var(--clr-cyan);">Admin@123</code>
        </div>
      </div>

      <!-- Back link -->
      <p style="text-align:center;margin-top:var(--space-lg);font-size:var(--text-sm);color:var(--clr-text-muted);">
        <a href="/index.html" style="color:var(--clr-purple);">← Back to Portfolio</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>

    <script src="/js/error_handler.js"></script>
  <script src="/js/main.js?v=2"></script>
  <script src="/js/api.js?v=2"></script>

  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      window.location.href = '/admin/dashboard.html';
    }

    // Toggle password visibility
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const pwd = document.getElementById('admin-password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    });

    // Login form submit
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('admin-email').value.trim().toLowerCase();
      const password = document.getElementById('admin-password').value;
      const errDiv   = document.getElementById('login-error');
      const errMsg   = document.getElementById('login-error-msg');
      const btn      = document.getElementById('login-btn');
      const btnText  = document.getElementById('login-btn-text');
      const spinner  = document.getElementById('login-spinner');

      if (!email || !password) {
        errDiv.style.display = 'block';
        errMsg.textContent = 'Please enter your email and password.';
        return;
      }

      // Loading state
      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      errDiv.style.display = 'none';

      try {
        const res = await API.auth.login(email, password);
        Auth.setToken(res.access_token);
        SuccessAnim.show({
          title: 'Welcome back! 👋',
          subtitle: `Logged in as ${res.user.name}`,
          badge: 'Admin Portal',
          autoClose: 1500
        });
        setTimeout(() => window.location.href = '/admin/dashboard.html', 1500);
      } catch (err) {
        errDiv.style.display = 'block';
        errMsg.textContent = err.message || 'Invalid email or password.';
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    });
  </script>

</body>
</html>
